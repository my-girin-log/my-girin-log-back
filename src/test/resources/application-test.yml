# 테스트 전용 프로필. dev 의 file-mode H2 와 격리되어 bootRun 중에도 충돌 없음.
spring:
  datasource:
    url: jdbc:h2:mem:mygrinlog-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never
  ai:
    anthropic:
      api-key: dummy-key-disabled

wootegotchi:
  llm:
    enabled: false
